<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/openwork.png" />
  <meta name="author" content="Saleh and Chanders" />
  <meta name="description"
    content="Hire vetted freelancers or get paid securely with smart-contract escrow on OpenWork — the decentralized job marketplace built for global, trustless work." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="OpenWork" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:title" content="OpenWork — Decentralized Job Marketplace on Blockchain" />
  <meta property="og:description"
    content="Hire vetted freelancers or get paid securely with smart-contract escrow on OpenWork — the decentralized job marketplace built for global, trustless work." />
  <meta property="og:image" content="https://www.openworkfyp.me/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://www.openworkfyp.me/" />
  <link rel="canonical" href="https://www.openworkfyp.me/" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@openworkhq" />
  <meta name="twitter:title" content="OpenWork — Decentralized Job Marketplace on Blockchain" />
  <meta name="twitter:description"
    content="Hire vetted freelancers or get paid securely with smart-contract escrow on OpenWork — the decentralized job marketplace built for global, trustless work." />
  <meta name="twitter:image" content="https://www.openworkfyp.me/og-image.png" />
  <title>OpenWork — Decentralized Job Marketplace on Blockchain</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/openwork.png" />
  
  <!-- Font Optimization: Preload critical weights, load rest asynchronously -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
  
  <!-- JSON-LD Structured Data: Organization + WebSite Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "https://www.openworkfyp.me/#organization",
        "name": "OpenWork",
        "url": "https://www.openworkfyp.me",
        "logo": "https://www.openworkfyp.me/openwork.png",
        "description": "Decentralized job marketplace built on blockchain technology",
        "sameAs": [
          "https://twitter.com/openworkhq"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Support",
          "url": "https://www.openworkfyp.me/contact"
        }
      },
      {
        "@type": "WebSite",
        "@id": "https://www.openworkfyp.me/#website",
        "url": "https://www.openworkfyp.me",
        "name": "OpenWork",
        "description": "Hire vetted freelancers or get paid securely with smart-contract escrow",
        "publisher": {
          "@id": "https://www.openworkfyp.me/#organization"
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.openworkfyp.me/jobs?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    ]
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
